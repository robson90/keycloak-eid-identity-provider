name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: ['*']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Maven verify
        run: mvn verify -P dev
